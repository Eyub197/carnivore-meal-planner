<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carnivore meal planner</title>
  </head>
  <body>
    <button type="button">Get meal plan</button>
    <main id="meal-plan">
      <pre></pre>
    </main>
    <script>
      const button = document.querySelector("button");
      const pre = document.querySelector("pre");

      button.addEventListener("click", async () => {
        const response = await fetch("/meal-plan");
        const mealPlan = await response.text();
        console.log(mealPlan.split("foodName"));
        pre.textContent = mealPlan;
      });
    </script>
  </body>
</html>
